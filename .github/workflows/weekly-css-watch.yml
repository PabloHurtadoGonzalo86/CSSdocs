name: Vigilante semanal de CSS

on:
  schedule:
    - cron: "17 6 * * 1" # lunes 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Ejecutar vigilante
        id: watcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/watch_css_changes.py

      - name: Configurar identidad de git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit del estado y el changelog
        run: |
          git add .github/scripts/state.json docs/novedades/changelog.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: vigilancia semanal de CSS $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Sin cambios que commitear esta semana."
          fi

      - name: Asegurar que existe la etiqueta css-watch
        if: steps.watcher.outputs.has_findings == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create css-watch --color 1f6feb --description "Hallazgos del vigilante semanal de CSS" || true

      - name: Crear Issue con los hallazgos
        if: steps.watcher.outputs.has_findings == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Vigilancia semanal de CSS — $(date -u +%Y-%m-%d)" \
            --body-file .github/scripts/last_report.md \
            --label css-watch
