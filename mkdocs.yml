site_name: CSSdocs
site_description: Documentación viva de CSS para dominio profesional en Frontend
site_url: https://pablohurtadogonzalo86.github.io/CSSdocs/
repo_name: PabloHurtadoGonzalo86/CSSdocs
repo_url: https://github.com/PabloHurtadoGonzalo86/CSSdocs
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Pablo Hurtado Gonzalo

theme:
  name: material
  language: es
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indeterminate
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      title: En esta página
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: es
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: false
      type: date
      fallback_to_build_date: true

extra:
  social:
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@midulive
      name: Curso de referencia (midulive)

nav:
  - Inicio: index.md
  - Fundamentos:
      - Qué es CSS y cómo se aplica: fundamentos/que-es-css.md
      - Cascada, herencia y especificidad: fundamentos/cascada-especificidad-herencia.md
      - Selectores: fundamentos/selectores.md
      - Unidades y valores: fundamentos/unidades.md
      - Colores: fundamentos/colores.md
      - El modelo de caja: fundamentos/modelo-de-caja.md
  - Layout:
      - Display y flujo normal: layout/display-y-flujo-normal.md
      - Overflow y desbordamiento: layout/overflow.md
      - Positioning: layout/positioning.md
      - Flexbox: layout/flexbox.md
      - CSS Grid: layout/grid.md
      - Multi-columna: layout/multicolumna.md
  - Diseño responsivo:
      - Media queries: responsive/media-queries.md
      - Container queries: responsive/container-queries.md
      - Unidades y funciones responsivas: responsive/unidades-y-funciones.md
  - Tipografía: tipografia/fuentes-y-texto.md
  - Animaciones:
      - Transiciones: animaciones/transiciones.md
      - Keyframes y animation: animaciones/keyframes.md
      - Transform: animaciones/transform.md
      - Scroll-driven animations: animaciones/scroll-driven-animations.md
  - CSS moderno:
      - Custom properties: moderno/custom-properties.md
      - Selectores modernos (:has, :is, :where): moderno/selectores-modernos.md
      - Nesting nativo: moderno/nesting.md
      - Cascade layers (@layer): moderno/cascade-layers.md
      - "@scope": moderno/scope.md
      - Color moderno (oklch, color-mix): moderno/color-moderno.md
  - Arquitectura CSS: arquitectura/metodologias-y-organizacion.md
  - Cheatsheets:
      - Flexbox: cheatsheets/flexbox-cheatsheet.md
      - Grid: cheatsheets/grid-cheatsheet.md
      - Selectores: cheatsheets/selectores-cheatsheet.md
  - Curso de midulive:
      - Resumen y recursos: curso-midulive/index.md
  - Novedades:
      - Changelog automático: novedades/changelog.md
